<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --azul-fondo:#050A2E;
    --azul-tablero:#0C1A8F;
    --azul-celda:#1126C2;
    --azul-celda-hover:#1E37E0;
    --azul-borde:#2A3FD6;
    --oro:#E8B23A;
    --oro-claro:#F4CD68;
    --blanco:#F3F4FC;
    --tenue:#6A77C9;
    --usada:#0A1252;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--azul-fondo);
    color:var(--blanco);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100%;
    padding:clamp(12px,3vw,32px);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Encabezado ---------- */
  header{
    text-align:center;
    margin-bottom:clamp(16px,2.5vw,28px);
  }
  h1{
    font-family:'Anton',sans-serif;
    font-size:clamp(56px,9vw,128px);
    letter-spacing:.04em;
    line-height:.92;
    color:var(--oro);
    text-transform:uppercase;
    text-shadow:0 3px 0 rgba(0,0,0,.35);
  }
  .subtitulo{
    margin-top:10px;
    color:var(--tenue);
    font-size:22px;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-weight:600;
  }

  /* ---------- Marcador de equipos ---------- */
  .marcador{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin:0 auto clamp(18px,2.5vw,30px);
    max-width:1100px;
  }
  .equipo{
    flex:1 1 190px;
    min-width:180px;
    max-width:300px;
    background:var(--azul-tablero);
    border:1px solid var(--azul-borde);
    border-radius:14px;
    padding:16px 18px;
    text-align:center;
  }
  .equipo .nombre{
    font-weight:700;
    font-size:22px;
    letter-spacing:.02em;
    outline:none;
    border-radius:4px;
    padding:3px 6px;
  }
  .equipo .nombre:focus{background:rgba(255,255,255,.08)}
  .equipo .puntaje{
    font-family:'Anton',sans-serif;
    font-size:56px;
    color:var(--oro);
    line-height:1.1;
    margin-top:4px;
  }
  .equipo .puntaje.neg{color:#FF8A8A}

  /* ---------- Tablero ---------- */
  .tablero-wrap{
    max-width:1100px;
    margin:0 auto;
    overflow-x:auto;
  }
  .tablero{
    display:grid;
    gap:10px;
    min-width:640px;
  }
  .categoria{
    background:var(--azul-tablero);
    border:1px solid var(--azul-borde);
    border-radius:8px;
    min-height:96px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:12px 8px;
    font-family:'Anton',sans-serif;
    text-transform:uppercase;
    font-size:clamp(17px,1.9vw,28px);
    letter-spacing:.03em;
    line-height:1.05;
  }
  .celda{
    background:var(--azul-celda);
    border:1px solid var(--azul-borde);
    border-radius:8px;
    min-height:92px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Anton',sans-serif;
    font-size:clamp(30px,3.6vw,54px);
    color:var(--oro);
    cursor:pointer;
    transition:background .12s ease, transform .08s ease;
    text-shadow:0 2px 0 rgba(0,0,0,.3);
  }
  .celda:hover{background:var(--azul-celda-hover);transform:translateY(-2px)}
  .celda:focus-visible{outline:3px solid var(--oro-claro);outline-offset:2px}
  .celda.usada{
    background:var(--usada);
    color:transparent;
    cursor:default;
    pointer-events:none;
    border-color:#1A256E;
  }

  /* ---------- Controles ---------- */
  .controles{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:clamp(18px,2.5vw,28px);
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:17px;
    letter-spacing:.04em;
    color:var(--blanco);
    background:transparent;
    border:1px solid var(--azul-borde);
    border-radius:8px;
    padding:12px 22px;
    cursor:pointer;
    transition:background .12s ease,border-color .12s ease;
  }
  .btn:hover{background:var(--azul-tablero);border-color:var(--tenue)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn:disabled:hover{background:transparent;border-color:var(--azul-borde)}
  .btn-deshacer{border-color:var(--oro);color:var(--oro-claro)}
  .btn-deshacer:not(:disabled):hover{background:rgba(232,178,58,.12);border-color:var(--oro)}

  /* ---------- Overlay de pista ---------- */
  .overlay{
    position:fixed;
    inset:0;
    background:var(--azul-tablero);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:clamp(24px,5vw,64px);
    z-index:50;
    animation:aparecer .18s ease;
  }
  .overlay.abierto{display:flex}
  @keyframes aparecer{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
  .overlay .meta{
    font-family:'Inter',sans-serif;
    text-transform:uppercase;
    letter-spacing:.16em;
    font-weight:700;
    font-size:24px;
    color:var(--oro);
    margin-bottom:clamp(24px,4vw,48px);
  }
  .overlay .pista{
    font-size:clamp(36px,5.5vw,88px);
    font-weight:600;
    line-height:1.18;
    max-width:22ch;
  }
  .overlay .respuesta{
    margin-top:clamp(22px,3vw,40px);
    font-family:'Anton',sans-serif;
    font-size:clamp(38px,5.5vw,92px);
    color:var(--oro-claro);
    line-height:1.1;
    display:none;
  }
  .overlay .respuesta.visible{display:block;animation:aparecer .2s ease}
  .overlay .pista-ayuda{
    margin-top:clamp(28px,4vw,52px);
    color:rgba(243,244,252,.6);
    font-size:19px;
    letter-spacing:.06em;
  }

  /* ---------- Panel de puntaje en overlay ---------- */
  .panel{
    display:none;
    margin-top:clamp(24px,4vw,40px);
    width:100%;
    max-width:760px;
  }
  .panel.visible{display:block;animation:aparecer .2s ease}
  .panel-titulo{
    font-size:16px;letter-spacing:.16em;text-transform:uppercase;
    color:rgba(243,244,252,.55);margin-bottom:16px;font-weight:600;
  }
  .puntos-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .puntos-equipo{
    background:rgba(0,0,0,.22);
    border:1px solid var(--azul-borde);
    border-radius:10px;
    padding:7px 11px;
    display:flex;align-items:center;gap:8px;
  }
  .puntos-equipo .pe-nombre{font-weight:600;font-size:15px;max-width:140px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pe-btn{
    width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;
    font-family:'Anton',sans-serif;font-size:24px;line-height:1;color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 0 rgba(0,0,0,.28), 0 5px 10px rgba(0,0,0,.20);
    transition:transform .09s ease, box-shadow .09s ease, filter .12s ease;
    text-shadow:0 1px 1px rgba(0,0,0,.25);
  }
  .pe-btn:hover{filter:brightness(1.08)}
  .pe-btn:active{transform:translateY(3px);
    box-shadow:0 1px 0 rgba(0,0,0,.30), 0 2px 6px rgba(0,0,0,.22)}
  .pe-btn.mas{background:linear-gradient(180deg,#3ED17F 0%,#1FA55F 100%)}
  .pe-btn.mas:active{background:linear-gradient(180deg,#37BE73 0%,#1B9455 100%)}
  .pe-btn.menos{background:linear-gradient(180deg,#F26551 0%,#D63B2B 100%)}
  .pe-btn.menos:active{background:linear-gradient(180deg,#E45B48 0%,#C33526 100%)}
  .panel-acciones{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}

  @media (max-width:600px){
    .overlay .pista{max-width:none}
    .puntos-equipo .pe-nombre{max-width:84px}
  }
</style>
</head>
<body>

  <header>
    <h1>Jeopardy</h1>
    <div class="subtitulo">Ampliada Data</div>
  </header>

  <div class="marcador" id="marcador"></div>

  <div class="tablero-wrap">
    <div class="tablero" id="tablero"></div>
  </div>

  <div class="controles">
    <button class="btn btn-deshacer js-deshacer" id="btnDeshacer" onclick="deshacer()" disabled>↶ Deshacer</button>
    <button class="btn" onclick="reiniciarTablero()">Reiniciar tablero</button>
    <button class="btn" onclick="reiniciarPuntajes()">Reiniciar puntajes</button>
  </div>

  <!-- Overlay de pista -->
  <div class="overlay" id="overlay">
    <div class="meta" id="ovMeta"></div>
    <div class="pista" id="ovPista"></div>
    <div class="respuesta" id="ovRespuesta"></div>
    <div class="pista-ayuda" id="ovAyuda">Toca o presiona Espacio para revelar la respuesta</div>

    <div class="panel" id="ovPanel">
      <div class="panel-titulo">Sumar o restar puntaje</div>
      <div class="puntos-grid" id="ovPuntos"></div>
      <div class="panel-acciones">
        <button class="btn btn-deshacer js-deshacer" onclick="deshacer()" disabled>↶ Deshacer</button>
        <button class="btn cerrar" onclick="cerrarOverlay()">Cerrar</button>
      </div>
    </div>
  </div>

<script>
/* =======================================================================
   EDITA TU JUEGO AQUÍ 👇
   - categorias: cada una con su "nombre" y 5 preguntas (o las que quieras).
   - cada pregunta: { puntos, pista, respuesta }
   - equipos: los nombres iniciales (luego puedes editarlos en pantalla).
   ======================================================================= */
const JUEGO = {
  equipos: ["IA", "Datos", "Data Value", "Ingeniería", "Data Governance"],
  categorias: [
    {
      nombre: "Mundo Walmart",
      preguntas: [
        { puntos:100, pista:"Completa el propósito: 'ayudar a las personas a ahorrar dinero para que…'", respuesta:"…vivan mejor" },
        { puntos:200, pista:"Fundador de Walmart, que abrió su primera tienda en 1962.", respuesta:"Sam Walton" },
        { puntos:300, pista:"Año en que Walmart llegó a Chile, al adquirir D&S.", respuesta:"2009" },
        { puntos:400, pista:"Ciudad de California (EE.UU.) donde está el campus de Walmart Labs y Walmart Global Tech.", respuesta:"Sunnyvale" },
      ]
    },
    {
      nombre: "Dato Mata Relato",
      preguntas: [
        { puntos:100, pista:"Lenguaje estándar para consultar bases de datos relacionales.", respuesta:"SQL" },
        { puntos:200, pista:"Servicio de data warehouse de Google para analizar datos a gran escala.", respuesta:"BigQuery" },
        { puntos:300, pista:"Tipo de gráfico ideal para mostrar la evolución de un valor en el tiempo.", respuesta:"Gráfico de líneas" },
        { puntos:400, pista:"Sigla del proceso de Extraer, Transformar y Cargar datos.", respuesta:"ETL" },
      ]
    },
    {
      nombre: "Aló IA",
      preguntas: [
        { puntos:100, pista:"Cuando un modelo inventa datos falsos con total seguridad, se llama así.", respuesta:"Alucinación" },
        { puntos:200, pista:"Asistente de IA de Anthropic.", respuesta:"Claude" },
        { puntos:300, pista:"Término en inglés para la IA que crea texto, imágenes o código.", respuesta:"IA Generativa (GenAI)" },
        { puntos:400, pista:"Arquitectura de redes neuronales (2017) detrás de los modelos de lenguaje actuales.", respuesta:"Transformer" },
      ]
    },
    {
      nombre: "Sopa de Siglas",
      preguntas: [
        { puntos:100, pista:"Sigla de la unidad central de procesamiento de un computador.", respuesta:"CPU" },
        { puntos:200, pista:"Sigla de 'preguntas frecuentes'.", respuesta:"FAQ" },
        { puntos:300, pista:"Sigla del protocolo seguro que aparece al inicio de una dirección web.", respuesta:"HTTPS" },
        { puntos:400, pista:"Sigla de 'producto mínimo viable' en desarrollo de productos.", respuesta:"MVP" },
      ]
    },
    {
      nombre: "Sebastián Torres",
      preguntas: [
        { puntos:100, pista:"La carrera que estudió Seba.", respuesta:"Ingeniería Civil Matemática" },
        { puntos:200, pista:"El nombre de la esposa de Seba.", respuesta:"Tanya" },
        { puntos:300, pista:"El tipo de mascota que tiene Seba.", respuesta:"Canario" },
        { puntos:400, pista:"El último día de Seba con el equipo.", respuesta:"Miércoles 15 de julio" },
      ]
    },
  ]
};
/* ===================== FIN DE LA EDICIÓN ===================== */


/* ---------- Estado ---------- */
const equipos = JUEGO.equipos.map(n => ({ nombre:n, puntaje:0 }));
let actual = null; // { cat, idx, puntos }

/* ---------- Historial / Deshacer ---------- */
const historial = [];
const MAX_HISTORIAL = 50;

function estadoActual(){
  return {
    puntajes: equipos.map(e => e.puntaje),
    usadas: [...document.querySelectorAll('.celda')].map(c => c.classList.contains('usada'))
  };
}
function guardarEstado(){
  historial.push(estadoActual());
  if(historial.length > MAX_HISTORIAL) historial.shift();
  actualizarBotonDeshacer();
}
function deshacer(){
  const s = historial.pop();
  if(!s) return;
  s.puntajes.forEach((p,i) => { if(equipos[i]) equipos[i].puntaje = p; });
  renderPuntajes();
  document.querySelectorAll('.celda').forEach((c,i) => c.classList.toggle('usada', !!s.usadas[i]));
  actualizarBotonDeshacer();
}
function actualizarBotonDeshacer(){
  const desactivado = historial.length === 0;
  document.querySelectorAll('.js-deshacer').forEach(b => b.disabled = desactivado);
}

/* ---------- Render del marcador ---------- */
function renderMarcador(){
  const cont = document.getElementById('marcador');
  cont.innerHTML = '';
  equipos.forEach((e,i)=>{
    const div = document.createElement('div');
    div.className = 'equipo';
    div.innerHTML = `
      <div class="nombre" contenteditable="true" spellcheck="false"
           onblur="renombrar(${i}, this.textContent)">${e.nombre}</div>
      <div class="puntaje ${e.puntaje<0?'neg':''}" id="pj-${i}">${e.puntaje}</div>`;
    cont.appendChild(div);
  });
}
function renderPuntajes(){
  equipos.forEach((e,i)=>{
    const el = document.getElementById('pj-'+i);
    el.textContent = e.puntaje;
    el.classList.toggle('neg', e.puntaje<0);
  });
}
function renombrar(i, txt){ equipos[i].nombre = txt.trim() || ('Equipo '+(i+1)); }

/* ---------- Render del tablero ---------- */
function renderTablero(){
  const cats = JUEGO.categorias;
  const tablero = document.getElementById('tablero');
  tablero.style.gridTemplateColumns = `repeat(${cats.length}, 1fr)`;
  tablero.innerHTML = '';

  // Fila de categorías
  cats.forEach(c=>{
    const h = document.createElement('div');
    h.className = 'categoria';
    h.textContent = c.nombre;
    tablero.appendChild(h);
  });

  // Filas de puntajes
  const maxFilas = Math.max(...cats.map(c=>c.preguntas.length));
  for(let f=0; f<maxFilas; f++){
    cats.forEach((c,ci)=>{
      const preg = c.preguntas[f];
      const celda = document.createElement('div');
      celda.className = 'celda';
      if(!preg){ celda.classList.add('usada'); tablero.appendChild(celda); return; }
      celda.textContent = preg.puntos;
      celda.tabIndex = 0;
      celda.setAttribute('role','button');
      celda.setAttribute('aria-label', `${c.nombre}, ${preg.puntos} puntos`);
      const abrir = ()=>abrirPista(ci, f, celda);
      celda.addEventListener('click', abrir);
      celda.addEventListener('keydown', ev=>{
        if(ev.key==='Enter' || ev.key===' '){ ev.preventDefault(); abrir(); }
      });
      tablero.appendChild(celda);
    });
  }
}

/* ---------- Overlay ---------- */
function abrirPista(ci, fi, celda){
  const cat = JUEGO.categorias[ci];
  const preg = cat.preguntas[fi];
  actual = { celda, puntos:preg.puntos };

  document.getElementById('ovMeta').textContent = `${cat.nombre} · ${preg.puntos}`;
  document.getElementById('ovPista').textContent = preg.pista;
  document.getElementById('ovRespuesta').textContent = preg.respuesta;

  document.getElementById('ovRespuesta').classList.remove('visible');
  document.getElementById('ovPanel').classList.remove('visible');
  document.getElementById('ovAyuda').style.display = 'block';

  document.getElementById('overlay').classList.add('abierto');
}

function revelar(){
  document.getElementById('ovRespuesta').classList.add('visible');
  document.getElementById('ovAyuda').style.display = 'none';
  renderPanelPuntos();
  document.getElementById('ovPanel').classList.add('visible');
}

function renderPanelPuntos(){
  const cont = document.getElementById('ovPuntos');
  const v = actual.puntos;
  cont.innerHTML = '';
  equipos.forEach((e,i)=>{
    const div = document.createElement('div');
    div.className = 'puntos-equipo';
    div.innerHTML = `
      <button class="pe-btn menos" title="Restar ${v}" onclick="sumar(${i},${-v})">−</button>
      <span class="pe-nombre">${e.nombre}</span>
      <button class="pe-btn mas" title="Sumar ${v}" onclick="sumar(${i},${v})">+</button>`;
    cont.appendChild(div);
  });
}

function sumar(i, n){ guardarEstado(); equipos[i].puntaje += n; renderPuntajes(); }

function cerrarOverlay(){
  if(actual && actual.celda && !actual.celda.classList.contains('usada')){
    guardarEstado();
    actual.celda.classList.add('usada');
  }
  document.getElementById('overlay').classList.remove('abierto');
  actual = null;
}

/* ---------- Atajos de teclado ---------- */
document.addEventListener('keydown', ev=>{
  if(!document.getElementById('overlay').classList.contains('abierto')) return;
  const yaRevelada = document.getElementById('ovRespuesta').classList.contains('visible');
  if(ev.key===' ' || ev.key==='Enter'){
    ev.preventDefault();
    if(!yaRevelada) revelar();
  }
  if(ev.key==='Escape') cerrarOverlay();
});
// Click en el fondo del overlay revela la respuesta
document.getElementById('overlay').addEventListener('click', ev=>{
  const panel = document.getElementById('ovPanel');
  if(panel.contains(ev.target)) return;
  if(!document.getElementById('ovRespuesta').classList.contains('visible')) revelar();
});

/* ---------- Reinicios ---------- */
function reiniciarTablero(){
  guardarEstado();
  document.querySelectorAll('.celda').forEach(c=>{
    if(c.textContent || c.getAttribute('role')==='button') c.classList.remove('usada');
  });
  renderTablero();
}
function reiniciarPuntajes(){
  guardarEstado();
  equipos.forEach(e=>e.puntaje=0);
  renderPuntajes();
}

/* ---------- Atajo Ctrl+Z para deshacer ---------- */
document.addEventListener('keydown', ev=>{
  if((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase()==='z'){
    ev.preventDefault();
    deshacer();
  }
});

/* ---------- Init ---------- */
renderMarcador();
renderTablero();
actualizarBotonDeshacer();
</script>
</body>
</html>
